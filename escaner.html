<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escaner de Entradas — Autocross Nacional</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      color: #fff;
    }

    .header {
      background: #2a2a2a;
      padding: 16px;
      text-align: center;
      border-bottom: 2px solid #e74c3c;
    }

    .header__logo {
      width: 120px;
      margin-bottom: 4px;
    }

    .header__title {
      font-size: 0.85rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .scanner {
      max-width: 500px;
      margin: 0 auto;
      padding: 16px;
    }

    .scanner__video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 2px solid #333;
    }

    .scanner__video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scanner__overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scanner__frame {
      width: 65%;
      height: 65%;
      border: 3px solid #e74c3c;
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
    }

    .scanner__status {
      text-align: center;
      padding: 12px;
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .scanner__btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: #e74c3c;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .scanner__btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .scanner__btn--secondary {
      background: #333;
    }

    .result {
      display: none;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }

    .result--valid {
      background: rgba(39, 174, 96, 0.15);
      border: 2px solid #2ecc71;
    }

    .result--invalid {
      background: rgba(231, 76, 60, 0.15);
      border: 2px solid #e74c3c;
    }

    .result--warning {
      background: rgba(243, 156, 18, 0.15);
      border: 2px solid #f39c12;
    }

    .result__icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .result__title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result__msg {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .result__details {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px;
      text-align: left;
      font-size: 0.85rem;
      color: #ccc;
    }

    .result__details p {
      margin: 4px 0;
    }

    .counter {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .counter__item {
      flex: 1;
      background: #2a2a2a;
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
    }

    .counter__num {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .counter__num--valid { color: #2ecc71; }
    .counter__num--invalid { color: #e74c3c; }
    .counter__num--total { color: #3498db; }

    .counter__label {
      font-size: 0.65rem;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo-negro.png" alt="Autocross" class="header__logo">
    <p class="header__title">Escaner de entradas — 17 mayo 2026</p>
  </div>

  <div class="scanner">
    <div class="counter">
      <div class="counter__item">
        <div class="counter__num counter__num--valid" id="countValid">0</div>
        <div class="counter__label">Validas</div>
      </div>
      <div class="counter__item">
        <div class="counter__num counter__num--invalid" id="countInvalid">0</div>
        <div class="counter__label">Rechazadas</div>
      </div>
      <div class="counter__item">
        <div class="counter__num counter__num--total" id="countTotal">0</div>
        <div class="counter__label">Total</div>
      </div>
    </div>

    <div id="resultBox" class="result"></div>

    <div class="scanner__video-container" id="videoContainer">
      <video id="video" autoplay playsinline></video>
      <div class="scanner__overlay">
        <div class="scanner__frame"></div>
      </div>
    </div>

    <p class="scanner__status" id="status">Toca el boton para iniciar el escaner</p>

    <button class="scanner__btn" id="btnScan" onclick="startScanner()">Iniciar Escaner</button>
    <button class="scanner__btn scanner__btn--secondary" id="btnStop" onclick="stopScanner()" style="display:none">Detener Escaner</button>

    <p style="margin-top:24px;text-align:center;font-size:0.7rem"><a href="https://thinkler.ai" target="_blank" style="font-size:inherit;text-decoration:none;letter-spacing:0.5px;color:#888">Powered by <span style="color:#1e566f;font-weight:bold">Think</span><span style="color:#41a2a8;font-weight:bold">ler</span><span style="color:#41a2a8">.ai</span></a></p>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    let html5QrCode = null;
    let isScanning = false;
    let isProcessing = false;
    let lastScannedCode = '';
    let lastScanTime = 0;
    let stats = { valid: 0, invalid: 0, total: 0 };

    const COOLDOWN_MS = 5000;
    const ALLOWED_HOST = 'n8n-n8n.heyett.easypanel.host';

    function escapeText(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function startScanner() {
      const videoContainer = document.getElementById('videoContainer');
      document.getElementById('btnScan').style.display = 'none';
      document.getElementById('btnStop').style.display = 'block';
      document.getElementById('status').textContent = 'Apunta la camara al codigo QR';

      html5QrCode = new Html5Qrcode("videoContainer");

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        () => {}
      ).catch(err => {
        document.getElementById('status').textContent = 'Error: no se pudo acceder a la camara';
        document.getElementById('btnScan').style.display = 'block';
        document.getElementById('btnStop').style.display = 'none';
      });

      isScanning = true;
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
          isScanning = false;
          document.getElementById('btnScan').style.display = 'block';
          document.getElementById('btnStop').style.display = 'none';
          document.getElementById('status').textContent = 'Escaner detenido';
        });
      }
    }

    async function onScanSuccess(decodedText) {
      if (isProcessing) return;

      const now = Date.now();

      if (decodedText === lastScannedCode && (now - lastScanTime) < COOLDOWN_MS) {
        return;
      }

      isProcessing = true;
      lastScannedCode = decodedText;
      lastScanTime = now;

      try {
        const qrUrl = new URL(decodedText);
        if (qrUrl.hostname !== ALLOWED_HOST || qrUrl.pathname !== '/webhook/autocross-verificar') {
          showResult('invalid', 'QR NO VALIDO', 'Este QR no es una entrada de Autocross', {});
          return;
        }
      } catch {
        showResult('invalid', 'QR NO VALIDO', 'Este QR no es una entrada de Autocross', {});
        return;
      }

      document.getElementById('status').textContent = 'Verificando...';

      try {
        const res = await fetch(decodedText);
        const html = await res.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const title = doc.querySelector('h1');
        const msg = doc.querySelectorAll('p')[0];
        const details = doc.querySelectorAll('p');

        const titleText = title ? title.textContent : 'RESPUESTA';
        const msgText = msg ? msg.textContent : '';

        let nombre = '';
        let entradaId = '';
        let cantidad = '';
        const strongTags = doc.querySelectorAll('strong');
        strongTags.forEach(tag => {
          const text = tag.textContent;
          const next = tag.nextSibling;
          if (text === 'Nombre:' && next) nombre = next.textContent.trim();
          if (text === 'ID:' && next) entradaId = next.textContent.trim();
          if (text === 'Entradas:' && next) cantidad = next.textContent.trim();
        });

        let type = 'invalid';
        if (titleText.includes('VALIDA')) type = 'valid';
        else if (titleText.includes('PENDIENTE')) type = 'warning';

        showResult(type, titleText, msgText, { nombre, entradaId, cantidad });

      } catch (err) {
        showResult('invalid', 'ERROR', 'No se pudo verificar la entrada', {});
      } finally {
        setTimeout(() => { isProcessing = false; }, COOLDOWN_MS);
      }

      document.getElementById('status').textContent = 'Apunta la camara al siguiente QR';
    }

    function showResult(type, title, msg, data) {
      const box = document.getElementById('resultBox');
      const cssClass = type === 'valid' ? 'result--valid' : type === 'warning' ? 'result--warning' : 'result--invalid';
      const icon = type === 'valid' ? '&#10004;' : type === 'warning' ? '!' : '&#10008;';
      const iconColor = type === 'valid' ? '#2ecc71' : type === 'warning' ? '#f39c12' : '#e74c3c';

      stats.total++;
      if (type === 'valid') stats.valid++;
      else stats.invalid++;

      document.getElementById('countValid').textContent = stats.valid;
      document.getElementById('countInvalid').textContent = stats.invalid;
      document.getElementById('countTotal').textContent = stats.total;

      box.className = `result ${cssClass}`;
      box.textContent = '';

      const iconEl = document.createElement('div');
      iconEl.className = 'result__icon';
      iconEl.style.color = iconColor;
      iconEl.innerHTML = icon;
      box.appendChild(iconEl);

      const titleEl = document.createElement('div');
      titleEl.className = 'result__title';
      titleEl.style.color = iconColor;
      titleEl.textContent = title;
      box.appendChild(titleEl);

      const msgEl = document.createElement('div');
      msgEl.className = 'result__msg';
      msgEl.textContent = msg;
      box.appendChild(msgEl);

      if (data.nombre) {
        const details = document.createElement('div');
        details.className = 'result__details';
        details.innerHTML =
          '<p><strong>Nombre:</strong> ' + escapeText(data.nombre) + '</p>' +
          '<p><strong>ID:</strong> ' + escapeText(data.entradaId) + '</p>' +
          '<p><strong>Entradas:</strong> ' + escapeText(data.cantidad) + '</p>';
        box.appendChild(details);
      }

      box.style.display = 'block';

      if (type === 'valid') {
        navigator.vibrate && navigator.vibrate(200);
      } else {
        navigator.vibrate && navigator.vibrate([100, 50, 100, 50, 100]);
      }
    }
  </script>
</body>
</html>
